<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 via-white to-purple-50 px-4 py-8">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-white/80 backdrop-blur-xl border border-gray-200 shadow-2xl rounded-2xl p-6 sm:p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h2 class="text-2xl sm:text-3xl font-bold text-gray-800">💬 Welcome to ChitChats 👋</h2>
        <p class="text-sm text-gray-500 mt-1">Sign in to continue chatting</p>
      </div>



      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Email -->
        <div>
          <label class="text-sm text-gray-600">Email</label>
          <div class="relative mt-1">
            <span class="absolute left-3 top-3 text-gray-400">📧</span>
            <input formControlName="email" type="email" placeholder="you@example.com"
                   class="w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-xl
                          focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition" />
          </div>
          <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
               class="text-red-500 text-xs mt-1">
            Valid email is required
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="text-sm text-gray-600">Password</label>
          <div class="relative mt-1">
            <span class="absolute left-3 top-3 text-gray-400">🔒</span>
            <input formControlName="password" type="password" placeholder="••••••••"
                   class="w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-xl
                          focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition" />
          </div>
          <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
               class="text-red-500 text-xs mt-1">
            Password is required
          </div>
        </div>

        <!-- Button -->
        <button type="submit" [disabled]="loginForm.invalid || loading"
                class="w-full py-3 rounded-xl text-white font-medium
                       bg-gradient-to-r from-blue-600 to-indigo-600
                       hover:from-blue-700 hover:to-indigo-700
                       transition-all duration-200
                       disabled:opacity-50 disabled:cursor-not-allowed
                       flex items-center justify-center gap-2">
          <span *ngIf="loading" class="animate-spin">⏳</span>
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>

      <!-- Footer -->
      <p class="mt-6 text-center text-sm text-gray-600">
        Don't have an account?
        <a routerLink="/auth/register" class="text-blue-600 font-medium hover:underline">Create account</a>
      </p>
    </div>
  </div>
</div>
