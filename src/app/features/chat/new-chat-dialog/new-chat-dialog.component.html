<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
  <div class="bg-white rounded-2xl w-full max-w-md max-h-[85vh] overflow-hidden shadow-2xl flex flex-col">
    
    <!-- Header -->
    <div class="px-5 py-4 border-b bg-gradient-to-r from-blue-50 to-indigo-50 shrink-0">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-bold text-gray-800">
          {{ isGroup ? '👥 Create Group' : '💬 New Message' }}
        </h2>
        <button (click)="close.emit()" 
                class="w-8 h-8 rounded-full hover:bg-gray-200 flex items-center justify-center transition">
          ✕
        </button>
      </div>
      
      <!-- Mode Toggle -->
      <div class="flex mt-3 bg-gray-200 rounded-lg p-1">
        <button (click)="isGroup=false" 
                [class.bg-white]="!isGroup"
                [class.shadow-sm]="!isGroup"
                class="flex-1 py-1.5 rounded-md text-sm font-medium transition">
          Private
        </button>
        <button (click)="isGroup=true" 
                [class.bg-white]="isGroup"
                [class.shadow-sm]="isGroup"
                class="flex-1 py-1.5 rounded-md text-sm font-medium transition">
          Group
        </button>
      </div>
    </div>

    <!-- Body (scrollable) -->
    <div class="flex-1 overflow-y-auto p-5 space-y-4">
      
      <!-- Group Info (only for groups) -->
      <div *ngIf="isGroup" class="space-y-4">
        <!-- Group Image Upload -->
        <div class="flex justify-center">
          <div class="relative">
            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white font-bold text-2xl shadow-md overflow-hidden">
              <img *ngIf="groupImagePreview" [src]="groupImagePreview" alt="Group" class="w-full h-full object-cover" />
              <span *ngIf="!groupImagePreview">📷</span>
            </div>
            <label class="absolute -bottom-1 -right-1 w-8 h-8 bg-white rounded-full shadow-md flex items-center justify-center cursor-pointer hover:bg-gray-50 transition border-2 border-white">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 text-blue-600">
                <path d="M12 9a3.75 3.75 0 100 7.5A3.75 3.75 0 0012 9z" />
                <path fill-rule="evenodd" d="M9.344 3.071a49.52 49.52 0 015.312 0c.967.052 1.83.585 2.332 1.39l.821 1.317c.24.383.645.643 1.11.71.386.054.77.113 1.152.177 1.432.239 2.429 1.493 2.429 2.909V18a3 3 0 01-3 3h-15a3 3 0 01-3-3V9.574c0-1.416.997-2.67 2.429-2.909.382-.064.766-.123 1.151-.178a1.56 1.56 0 001.11-.71l.822-1.315a2.942 2.942 0 012.332-1.39zM6.75 12.75a5.25 5.25 0 1110.5 0 5.25 5.25 0 01-10.5 0zm12-1.5a.75.75 0 100-1.5.75.75 0 000 1.5z" clip-rule="evenodd" />
              </svg>
              <input type="file" (change)="onGroupImageSelected($event)" accept="image/*" class="hidden" />
            </label>
            <button *ngIf="groupImagePreview" (click)="removeGroupImage()"
                    class="absolute -top-1 -right-1 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-xs hover:bg-red-600 transition">
              ✕
            </button>
          </div>
        </div>

        <!-- Group Name -->
        <div>
          <label class="text-xs font-medium text-gray-500 mb-1 block">Group Name</label>
          <input [(ngModel)]="groupName" placeholder="Enter group name"
                 class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition" />
        </div>

        <!-- Group Description -->
        <div>
          <label class="text-xs font-medium text-gray-500 mb-1 block">Description (optional)</label>
          <textarea [(ngModel)]="groupDescription" placeholder="Add group description" rows="2"
                    class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition resize-none"></textarea>
        </div>

        <!-- Selected members count -->
        <div class="text-xs text-gray-500">
          {{ selectedUsers.length }} member{{ selectedUsers.length !== 1 ? 's' : '' }} selected
        </div>
      </div>

      <!-- Search -->
      <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" 
             class="w-4 h-4 text-gray-400 absolute left-3 top-3">
          <path fill-rule="evenodd" d="M10.5 3.75a6.75 6.75 0 100 13.5 6.75 6.75 0 000-13.5zM2.25 10.5a8.25 8.25 0 1114.59 5.28l4.69 4.69a.75.75 0 11-1.06 1.06l-4.69-4.69A8.25 8.25 0 012.25 10.5z" clip-rule="evenodd" />
        </svg>
        <input [(ngModel)]="searchQuery" placeholder="Search users..." 
               class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition" />
      </div>

      <!-- User List -->
      <div class="border border-gray-200 rounded-xl overflow-hidden">
        <div class="max-h-48 overflow-y-auto">
          <div *ngFor="let user of filteredUsers" 
               (click)="toggleUserSelection(user)"
               class="flex items-center p-2.5 hover:bg-gray-50 cursor-pointer transition"
               [class.bg-blue-50]="isSelected(user.userId)">
            
            <!-- Avatar -->
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center text-white font-bold text-sm mr-3 shrink-0">
              <img *ngIf="user.avatarUrl" [src]="user.avatarUrl" class="w-full h-full rounded-full object-cover" />
              <span *ngIf="!user.avatarUrl">{{ user.username.charAt(0).toUpperCase() }}</span>
            </div>
            
            <!-- User Info -->
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium text-gray-800 truncate">{{ user.username }}</div>
              <div class="text-xs text-gray-400 truncate">{{ user.email }}</div>
            </div>

            <!-- Selection indicator -->
            <div class="ml-2 shrink-0">
              <div *ngIf="isSelected(user.userId)" 
                   class="w-5 h-5 rounded-full bg-blue-600 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3 h-3 text-white">
                  <path fill-rule="evenodd" d="M19.916 4.626a.75.75 0 01.208 1.04l-9 13.5a.75.75 0 01-1.154.114l-6-6a.75.75 0 011.06-1.06l5.353 5.353 8.493-12.739a.75.75 0 011.04-.208z" clip-rule="evenodd" />
                </svg>
              </div>
              <div *ngIf="!isSelected(user.userId)" 
                   class="w-5 h-5 rounded-full border-2 border-gray-300"></div>
            </div>
          </div>
          
          <div *ngIf="filteredUsers.length === 0" 
               class="p-6 text-center text-gray-400 text-sm">
            {{ searchQuery ? 'No users found' : 'No users available' }}
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-5 py-4 border-t bg-gray-50 shrink-0 space-y-2">
      <button (click)="startChat()" [disabled]="loading || (!isGroup && selectedUsers.length !== 1) || (isGroup && (!groupName.trim() || selectedUsers.length === 0))"
              class="w-full py-2.5 rounded-xl text-white font-medium text-sm
                     bg-gradient-to-r from-blue-600 to-indigo-600
                     hover:from-blue-700 hover:to-indigo-700
                     disabled:opacity-50 disabled:cursor-not-allowed
                     transition-all duration-200">
        {{ loading ? 'Creating...' : (isGroup ? 'Create Group' : 'Start Chat') }}
      </button>
      <button (click)="close.emit()" 
              class="w-full py-2.5 rounded-xl text-gray-600 font-medium text-sm
                     bg-gray-200 hover:bg-gray-300 transition">
        Cancel
      </button>
    </div>
  </div>
</div>
