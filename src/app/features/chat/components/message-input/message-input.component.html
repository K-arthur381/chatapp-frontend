<div class="flex flex-col shrink-0">
  <!-- Upload Progress Bar -->
  <div *ngIf="isUploading" 
       class="bg-gradient-to-r from-blue-50 to-indigo-50 border-t border-blue-100 px-4 py-3">
    <div class="flex items-center gap-3">
      <!-- Animated Upload Icon -->
      <div class="relative shrink-0">
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
          <svg class="animate-pulse w-4 h-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 9a3.75 3.75 0 100 7.5A3.75 3.75 0 0012 9z" />
            <path fill-rule="evenodd" d="M9.344 3.071a49.52 49.52 0 015.312 0c.967.052 1.83.585 2.332 1.39l.821 1.317c.24.383.645.643 1.11.71.386.054.77.113 1.152.177 1.432.239 2.429 1.493 2.429 2.909V18a3 3 0 01-3 3h-15a3 3 0 01-3-3V9.574c0-1.416.997-2.67 2.429-2.909.382-.064.766-.123 1.151-.178a1.56 1.56 0 001.11-.71l.822-1.315a2.942 2.942 0 012.332-1.39zM6.75 12.75a5.25 5.25 0 1110.5 0 5.25 5.25 0 01-10.5 0zm12-1.5a.75.75 0 100-1.5.75.75 0 000 1.5z" clip-rule="evenodd" />
          </svg>
        </div>
        <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-blue-500 rounded-full border-2 border-white animate-ping"></div>
      </div>
      
      <!-- Progress Info -->
      <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs text-blue-700 font-semibold">
            {{ uploadProgress < 100 ? 'Uploading...' : 'Processing...' }}
          </span>
          <span class="text-xs text-blue-600 font-bold">{{ uploadProgress }}%</span>
        </div>
        <div class="h-2 bg-blue-200 rounded-full overflow-hidden shadow-inner">
          <div class="h-full bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full transition-all duration-300 ease-out"
               [style.width.%]="uploadProgress"></div>
        </div>
        <div class="text-[10px] text-blue-500 mt-1">
          {{ uploadingCount }} file{{ uploadingCount > 1 ? 's' : '' }} selected
        </div>
      </div>

      <!-- Cancel Button -->
      <button (click)="hideUploadProgress()" 
              class="shrink-0 w-7 h-7 rounded-full bg-white border border-blue-200 hover:bg-red-50 hover:border-red-300 flex items-center justify-center transition group"
              title="Cancel upload">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" 
             class="w-3.5 h-3.5 text-blue-400 group-hover:text-red-500 transition-colors">
          <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 011.06 0L12 10.94l5.47-5.47a.75.75 0 111.06 1.06L13.06 12l5.47 5.47a.75.75 0 11-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 01-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 010-1.06z" clip-rule="evenodd" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Emoji Picker Panel -->
  <div *ngIf="showEmojiPicker" 
       class="bg-white border-t shadow-lg max-h-56 overflow-y-auto">
    <div class="sticky top-0 bg-white px-3 py-2 border-b text-xs font-semibold text-gray-500">
      Emojis
    </div>
    <div *ngFor="let group of emojiGroups" class="px-3 py-2">
      <div class="text-[10px] text-gray-400 font-medium mb-1.5 uppercase tracking-wider">{{ group.name }}</div>
      <div class="flex flex-wrap gap-1">
        <button *ngFor="let emoji of group.emojis" 
                (click)="addEmoji(emoji)"
                class="w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded-lg text-lg transition active:scale-125">
          {{ emoji }}
        </button>
      </div>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="flex items-center gap-1.5 px-3 py-2 bg-white border-t shadow-sm">
    
    <!-- Emoji Button -->
    <button (click)="toggleEmojiPicker()" 
            [disabled]="isUploading"
            class="shrink-0 w-9 h-9 rounded-full bg-gray-100 hover:bg-yellow-100 flex items-center justify-center transition active:scale-95 disabled:opacity-40"
            [class.bg-yellow-100]="showEmojiPicker"
            [class.ring-2]="showEmojiPicker"
            [class.ring-yellow-300]="showEmojiPicker"
            title="Emoji">
      <span class="text-lg">😊</span>
    </button>

    <!-- Image Upload Button -->
    <button (click)="triggerImageUpload()" 
            [disabled]="isUploading"
            class="shrink-0 w-9 h-9 rounded-full bg-gray-100 hover:bg-blue-100 flex items-center justify-center transition active:scale-95 disabled:opacity-40"
            title="Send images">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" 
           class="w-4 h-4 text-gray-500 group-hover:text-blue-500 transition-colors">
        <path fill-rule="evenodd" d="M1.5 6a2.25 2.25 0 012.25-2.25h16.5A2.25 2.25 0 0122.5 6v12a2.25 2.25 0 01-2.25 2.25H3.75A2.25 2.25 0 011.5 18V6zM3 16.06V18c0 .414.336.75.75.75h16.5A.75.75 0 0021 18v-1.94l-2.69-2.689a1.5 1.5 0 00-2.12 0l-.88.879.97.97a.75.75 0 11-1.06 1.06l-5.16-5.159a1.5 1.5 0 00-2.12 0L3 16.061zm10.125-7.81a1.125 1.125 0 112.25 0 1.125 1.125 0 01-2.25 0z" clip-rule="evenodd" />
      </svg>
    </button>

    <!-- File Upload Button -->
    <button (click)="triggerFileUpload()" 
            [disabled]="isUploading"
            class="shrink-0 w-9 h-9 rounded-full bg-gray-100 hover:bg-blue-100 flex items-center justify-center transition active:scale-95 disabled:opacity-40"
            title="Send file">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" 
           class="w-4 h-4 text-gray-500 hover:text-blue-500 transition-colors">
        <path fill-rule="evenodd" d="M18.97 3.659a2.25 2.25 0 00-3.182 0l-10.94 10.94a3.75 3.75 0 105.304 5.303l7.693-7.693a.75.75 0 011.06 1.06l-7.693 7.693a5.25 5.25 0 11-7.424-7.424l10.939-10.94a3.75 3.75 0 115.303 5.304L9.097 18.835l-.002.002a.75.75 0 01-1.06-1.06l10.94-10.94a2.25 2.25 0 00-3.182-3.182z" clip-rule="evenodd" />
      </svg>
    </button>

    <!-- Hidden File Inputs -->
    <input #imageInput type="file" (change)="onImagesSelected($event)" class="hidden" 
           accept="image/*" multiple />
    <input #fileInput type="file" (change)="onFileSelected($event)" class="hidden" 
           accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar,.mp3,.mp4,.avi,.mov" />

    <!-- Message Input -->
    <div class="flex-1 relative">
      <input 
        #messageInput
        [(ngModel)]="message" 
        (keydown.enter)="onSend()" 
        (input)="onInputChange()" 
        placeholder="Type a message..."
        [disabled]="isUploading"
        class="w-full bg-gray-100 rounded-full pl-4 pr-12 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition disabled:opacity-40 placeholder:text-gray-400"
      />
    </div>

    <!-- Send Button -->
    <button 
      (click)="onSend()" 
      [disabled]="!message.trim() || isUploading"
      class="shrink-0 w-10 h-10 rounded-full flex items-center justify-center transition-all duration-200 active:scale-90 shadow-sm"
      [class.bg-blue-600]="message.trim() && !isUploading"
      [class.bg-gray-300]="!message.trim() || isUploading"
      [class.hover:bg-blue-700]="message.trim() && !isUploading"
      [class.hover:shadow-md]="message.trim() && !isUploading"
      [class.cursor-not-allowed]="!message.trim() || isUploading"
      title="Send message">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" 
           class="w-5 h-5 text-white transition-transform duration-200"
           [class.rotate-45]="message.trim()"
           [class.scale-110]="message.trim()">
        <path d="M3.478 2.404a.75.75 0 00-.926.941l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.404z" />
      </svg>
    </button>
  </div>
</div>
