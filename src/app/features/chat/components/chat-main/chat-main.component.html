<div class="flex h-screen bg-white overflow-hidden">
  <!-- Conversation list sidebar -->
  <div class="w-full lg:w-1/4 border-r flex flex-col" [class.hidden]="isMobile && conversationId"
    [class.lg:flex]="true">

    <!-- App Title + New Chat Button -->
    <div class="px-3 py-2 border-b bg-white shrink-0">
      <div class="flex items-center justify-between">
        <h1 class="text-lg font-bold text-gray-800">💬 ChitChats</h1>
        <button (click)="openNewChatDialog()"
          class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center hover:bg-blue-700 active:scale-95 transition shadow-sm"
          title="New Chat">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
            <path fill-rule="evenodd"
              d="M12 3.75a.75.75 0 01.75.75v6.75h6.75a.75.75 0 010 1.5h-6.75v6.75a.75.75 0 01-1.5 0v-6.75H5.25a.75.75 0 010-1.5h6.75V4.5a.75.75 0 01.75-.75z"
              clip-rule="evenodd" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Conversation List (scrollable) -->
    <app-chat-list></app-chat-list>

    <!-- Current User Profile (fixed at bottom) -->
    <div class="shrink-0 border-t bg-gradient-to-r from-blue-50 to-indigo-50">
      <div class="p-3">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2 flex-1 min-w-0">
            <!-- User Avatar -->
            <div class="relative shrink-0">
              <!-- <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm shadow-md">
                {{ currentUser?.username?.charAt(0)?.toUpperCase() || '?' }}
              </div> -->
              <div
                class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm shadow-md overflow-hidden">
                <img [src]="currentUser?.avatarUrl" alt="avatar" class="object-cover w-full h-full" />
              </div>

              <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></span>
            </div>

            <!-- User Info -->
            <div class="min-w-0">
              <div class="text-sm font-semibold text-gray-800 truncate">
                {{ currentUser?.username || 'User' }}
              </div>
              <div class="text-xs text-gray-500 truncate">
                {{ currentUser?.email || '' }}
              </div>
            </div>
          </div>

          <!-- Logout Button -->
          <!-- Logout Button (Icon Only) -->
          <button (click)="logout()"
            class="shrink-0 w-9 h-9 rounded-full bg-white hover:bg-red-50 flex items-center justify-center transition-all duration-200 group shadow-sm border border-gray-200 hover:border-red-300 active:scale-95"
            title="Logout">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              class="w-4 h-4 text-gray-500 group-hover:text-red-500 transition-colors">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat window -->
  <div class="flex-1 flex flex-col" [class.hidden]="isMobile && !conversationId" [class.lg:flex]="true">

    <!-- Mobile Header with Back Button -->
    <!-- <div *ngIf="isMobile && conversationId"

      <button (click)="goBack()"

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-gray-700">
          <path fill-rule="evenodd" d="M7.72 12.53a.75.75 0 010-1.06l7.5-7.5a.75.75 0 111.06 1.06L9.31 12l6.97 6.97a.75.75 0 11-1.06 1.06l-7.5-7.5z" clip-rule="evenodd" />
        </svg>
      </button>
      <div class="flex items-center gap-2 flex-1 min-w-0">

        </div>
      </div>
    </div> -->

    <app-chat-window></app-chat-window>
  </div>
</div>

<!-- New Chat Dialog -->
<app-new-chat-dialog *ngIf="showNewChatDialog" (close)="showNewChatDialog = false"></app-new-chat-dialog>
