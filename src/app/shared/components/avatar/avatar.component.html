<div class="relative w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center text-white font-semibold text-sm overflow-hidden">
  <img *ngIf="url" [src]="url" alt="avatar" class="object-cover w-full h-full" />
  <span *ngIf="!url">{{ initials }}</span>
  <span *ngIf="online !== undefined" class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white"
        [ngClass]="online ? 'bg-green-500' : 'bg-gray-400'"></span>
</div>
